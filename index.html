<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerdVibe 종합 센티먼트 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.1/kakao.min.js" crossorigin="anonymous" async></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111113;
    --surface2: #18181b;
    --border: #27272a;
    --text: #fafafa;
    --text2: #a1a1aa;
    --text3: #71717a;
    --cyan: #00d4aa;
    --cyan-dim: rgba(0,212,170,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --orange: #f97316;
    --orange-dim: rgba(249,115,22,0.15);
    --yellow: #eab308;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Header */
  .header {
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    position: relative;
  }
  .header h1 span { color: var(--cyan); }
  .header .subtitle {
    color: var(--text3);
    font-size: 13px;
    margin-top: 6px;
    position: relative;
  }
  .updated {
    color: var(--text3);
    font-size: 11px;
    margin-top: 8px;
    position: relative;
  }
  .updated .mono { color: var(--cyan); }

  /* Main Gauge */
  .gauge-section {
    padding: 20px 24px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .gauge-wrap {
    position: relative;
    width: 260px;
    height: 150px;
    margin-bottom: 10px;
  }
  .gauge-canvas { width: 260px; height: 150px; }
  .gauge-value {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
  .gauge-value .score {
    font-size: 48px;
    font-weight: 900;
    line-height: 1;
  }
  .gauge-value .rating {
    font-size: 14px;
    font-weight: 500;
    margin-top: 2px;
  }
  .gauge-components {
    display: flex;
    gap: 12px;
    margin-top: 36px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .gauge-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 90px;
  }
  .gauge-chip .label { color: var(--text3); font-size: 10px; }
  .gauge-chip .val { font-weight: 700; font-size: 16px; }

  /* Tabs */
  .tabs {
    display: flex;
    padding: 0 16px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    justify-content: center;
  }
  .tabs::-webkit-scrollbar { display: none; }
  @media (max-width:639px) {
    .tabs { justify-content: flex-start; padding: 0 12px; }
    .tab { padding: 10px 12px; font-size: 12px; }
  }
  .tab {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text2); }
  .tab.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
  }

  /* Panels */
  .panel { display: none; padding: 20px 16px; max-width: 900px; margin-left: auto; margin-right: auto; }
  .panel.active { display: block; }

  /* CNN Fear & Greed Detail */
  .fg-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .fg-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .fg-item .info { flex: 1; }
  .fg-item .name {
    font-size: 13px;
    font-weight: 500;
  }
  .fg-item .desc {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }
  .fg-item .score-badge {
    min-width: 52px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
  }
  .fg-item .bar-wrap {
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .fg-item .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  /* Chart container */
  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }
  .chart-box .chart-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .chart-container {
    position: relative;
    height: 280px;
  }

  /* ApeWisdom Ticker Table */
  .ticker-header {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    justify-content: center;
  }
  .ticker-filter {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    transition: all 0.2s;
  }
  .ticker-filter.active {
    background: var(--cyan-dim);
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .ticker-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 4px;
  }
  .ticker-table th {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 6px 10px;
    text-align: left;
    font-weight: 500;
  }
  .ticker-table th:last-child,
  .ticker-table td:last-child { text-align: right; }
  .ticker-table td {
    background: var(--surface);
    padding: 10px;
    font-size: 13px;
  }
  .ticker-table tr td:first-child { border-radius: 8px 0 0 8px; }
  .ticker-table tr td:last-child { border-radius: 0 8px 8px 0; }
  .rank-badge {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    background: var(--surface2);
    color: var(--text2);
  }
  .rank-badge.top3 { background: var(--cyan-dim); color: var(--cyan); }
  .ticker-symbol {
    font-weight: 700;
    color: var(--text);
  }
  .ticker-name {
    color: var(--text3);
    font-size: 11px;
  }
  .trend-up { color: var(--green); }
  .trend-down { color: var(--red); }
  .trend-flat { color: var(--text3); }
  .mentions-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    min-width: 60px;
    overflow: hidden;
  }
  .mentions-fill {
    height: 100%;
    background: var(--cyan);
    border-radius: 3px;
  }

  /* LunarCrush */
  .coin-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  .coin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .coin-card .coin-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .coin-card .coin-symbol { color: var(--text3); font-size: 11px; }
  .sentiment-donut {
    width: 80px;
    height: 80px;
    margin: 10px auto;
  }
  .coin-stat {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }
  .coin-stat .num { color: var(--text); font-weight: 600; }

  /* Finnhub */
  .news-bars { display: flex; flex-direction: column; gap: 8px; }
  .news-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .news-item .symbol-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .news-item .sym {
    font-weight: 700;
    font-size: 15px;
  }
  .news-item .buzz {
    font-size: 11px;
    color: var(--text3);
  }
  .sentiment-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    display: flex;
    overflow: hidden;
  }
  .sentiment-bar .bull {
    background: var(--green);
    transition: width 0.8s ease;
  }
  .sentiment-bar .bear {
    background: var(--red);
    transition: width 0.8s ease;
  }
  .sentiment-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 10px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px 16px;
    color: var(--text3);
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  .footer a { color: var(--cyan); text-decoration: none; }

  /* PERIOD BUTTONS */
  .period-btn{padding:4px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text3);background:transparent;border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
  .period-btn:hover{color:var(--text2);background:rgba(255,255,255,0.03)}
  .period-btn.active{color:var(--cyan);background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}

  /* SHARE BAR */
  .share-bar{display:flex;align-items:center;justify-content:center;padding:14px 16px;gap:6px;flex-wrap:wrap;margin-top:20px}
  .share-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s;border:1px solid var(--border);background:var(--surface);color:#999;white-space:nowrap}
  .share-btn:hover{transform:translateY(-1px);box-shadow:0 1px 3px rgba(0,0,0,.5);color:var(--text)}
  .share-btn svg{flex-shrink:0}
  .share-btn--x:hover{border-color:#fff;color:#fff;background:#111}
  .share-btn--kakao:hover{border-color:#FEE500;color:#191919;background:#FEE500}
  .share-btn--tg:hover{border-color:#26A5E4;color:#fff;background:rgba(38,165,228,.15)}
  .share-btn--copy:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,170,0.12)}
  .toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.7);animation:toastIn .3s ease;border-left:3px solid #22c55e}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  @media (max-width:639px) {
    .share-btn span.label-text{display:none}
    .share-btn{padding:8px 10px}
  }

  @media (min-width:640px) {
    .fg-grid { grid-template-columns: 1fr 1fr; }
    .coin-cards { grid-template-columns: repeat(5, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>HerdVibe</span> 종합 센티먼트</h1>
  <div class="subtitle">무료 데이터만으로 시장 심리를 한눈에</div>
  <div class="updated" id="updatedAt">마지막 업데이트: <span class="mono">--</span></div>
</div>

<!-- Main Gauge -->
<div class="gauge-section">
  <div class="gauge-wrap">
    <canvas id="gaugeChart" class="gauge-canvas"></canvas>
    <div class="gauge-value">
      <div class="score mono" id="compositeScore">--</div>
      <div class="rating" id="compositeRating">로딩 중</div>
    </div>
  </div>
  <div class="gauge-components" id="gaugeComponents"></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="cnn">주식 F&G</div>
  <div class="tab" data-tab="apewisdom">커뮤니티</div>
  <div class="tab" data-tab="crypto">크립토 센티먼트</div>
  <div class="tab" data-tab="finnhub">뉴스 센티먼트</div>
</div>

<!-- Panel: CNN Fear & Greed -->
<div class="panel active" id="panel-cnn">
  <div class="fg-grid" id="fgGrid"></div>
  <div class="chart-box">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div class="chart-title" style="margin:0">CNN Fear & Greed vs SPY</div>
      <div style="display:flex;gap:4px">
        <button class="period-btn" data-days="30" onclick="setHistoryPeriod(30,this)">1M</button>
        <button class="period-btn" data-days="90" onclick="setHistoryPeriod(90,this)">3M</button>
        <button class="period-btn" data-days="180" onclick="setHistoryPeriod(180,this)">6M</button>
        <button class="period-btn" data-days="365" onclick="setHistoryPeriod(365,this)">1Y</button>
        <button class="period-btn" data-days="0" onclick="setHistoryPeriod(0,this)">ALL</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="fgHistoryChart"></canvas>
    </div>
  </div>
</div>

<!-- Panel: ApeWisdom -->
<div class="panel" id="panel-apewisdom">
  <div class="ticker-header">
    <div class="ticker-filter active" data-filter="all-stocks">주식</div>
    <div class="ticker-filter" data-filter="all-crypto">크립토</div>
  </div>
  <table class="ticker-table" id="tickerTable">
    <thead>
      <tr>
        <th>#</th>
        <th>종목</th>
        <th>언급</th>
        <th>24h 변화</th>
      </tr>
    </thead>
    <tbody id="tickerBody"></tbody>
  </table>
</div>

<!-- Panel: Crypto Sentiment -->
<div class="panel" id="panel-crypto">
  <div id="cryptoFGSection"></div>
  <div class="chart-box">
    <div class="chart-title">크립토 Fear & Greed 추이 (30일)</div>
    <div class="chart-container">
      <canvas id="cryptoFGChart"></canvas>
    </div>
  </div>
  <div style="margin-top:16px">
    <div class="chart-title" style="margin-bottom:12px">CoinGecko 트렌딩 코인</div>
    <div id="trendingCoins"></div>
  </div>
</div>

<!-- Panel: Finnhub -->
<div class="panel" id="panel-finnhub">
  <div class="news-bars" id="newsBars"></div>
</div>

<!-- SHARE BAR -->

  <button class="share-btn" onclick="doShare('instagram',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg><span class="label-text">인스타</span></button>
  <button class="share-btn share-btn--copy" onclick="doShare('link',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span class="label-text">링크 복사</span></button>
</div>

</div>

let DATA = SAMPLE_DATA;
let SPY_DATA = [];

async function loadData() {
  try {
    const resp = await fetch('data/sentiment.json');
    if (resp.ok) {
      const json = await resp.json();
      if (json.cnn_fear_greed) DATA = json;
    }
  } catch (e) { /* 샘플 데이터 사용 */ }

  // SPY 데이터 로드
  try {
    const resp = await fetch('data/spy.json');
    if (resp.ok) {
      SPY_DATA = await resp.json();
    }
  } catch (e) { /* SPY 데이터 없으면 무시 */ }

  render();
}

// 유틸리티
// ═══════════════════════════════════════════════
function getScoreColor(score) {
  if (score >= 75) return 'var(--green)';
  if (score >= 55) return 'var(--cyan)';
  if (score >= 45) return 'var(--yellow)';
  if (score >= 25) return 'var(--orange)';
  return 'var(--red)';
}

function getRatingKr(rating) {
  const map = {
    'Extreme Fear': '극도의 공포', 'Fear': '공포',
    'Neutral': '중립', 'Greed': '탐욕', 'Extreme Greed': '극도의 탐욕'
  };
  return map[rating] || rating;
}

function formatNum(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

// ── Gauge ──
function renderGauge() {
  const c = DATA.composite;
  const score = c.score;
  const color = getScoreColor(score);

  document.getElementById('compositeScore').textContent = score;
  document.getElementById('compositeScore').style.color = color;
  document.getElementById('compositeRating').textContent = c.rating;
  document.getElementById('compositeRating').style.color = color;

  // Components chips
  const compEl = document.getElementById('gaugeComponents');
  const labels = {
    cnn_fear_greed: '주식 F&G',
    crypto_fear_greed: '크립토 F&G',
    community_trend: '커뮤니티',
    news_sentiment: '뉴스'
  };
  compEl.innerHTML = Object.entries(c.components || {}).map(([k, v]) => `
    <div class="gauge-chip">
      <span class="label">${labels[k] || k}</span>
      <span class="val mono" style="color:${getScoreColor(v)}">${v}</span>
    </div>
  `).join('');

  // Semicircle gauge
  const ctx = document.getElementById('gaugeChart').getContext('2d');
  if (gaugeChart) gaugeChart.destroy();

  gaugeChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [score, 100 - score],
        backgroundColor: [color, 'rgba(255,255,255,0.05)'],
        borderWidth: 0,
        circumference: 180,
        rotation: 270,
      }]
    },
    options: {
      responsive: false,
      cutout: '78%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      animation: { animateRotate: true, duration: 1200 }
    }
  });
}

// ── CNN Fear & Greed ──
function renderCNN() {
  const fg = DATA.cnn_fear_greed;
  if (!fg) return;

  const grid = document.getElementById('fgGrid');
  const indicators = fg.indicators || {};
  grid.innerHTML = Object.entries(indicators).map(([key, ind]) => {
    const sc = parseFloat(ind.score) || 0;
    const color = getScoreColor(sc);
    return `
    <div class="fg-item">
      <div class="info">
        <div class="name">${ind.name_kr}</div>
        <div class="desc">${getRatingKr(ind.rating)}</div>
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${sc}%; background:${color}"></div>
        </div>
      </div>
      <div class="score-badge mono" style="background:${color}22; color:${color}">${sc}</div>
    </div>`;
  }).join('');

  // History chart — auto-detect best period
  updatePeriodButtons();
  renderHistoryChart(currentHistoryDays);
}

var currentHistoryDays = 0; // default ALL
function setHistoryPeriod(days, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentHistoryDays = days;
  renderHistoryChart(days);
}

function updatePeriodButtons() {
  const fg = DATA.cnn_fear_greed;
  if (!fg) return;
  const history = fg.history || [];
  const totalDays = history.length;

  document.querySelectorAll('.period-btn').forEach(btn => {
    const d = parseInt(btn.dataset.days);
    if (d > 0 && d > totalDays) {
      btn.style.opacity = '0.3';
      btn.style.pointerEvents = 'none';
    } else {
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    }
  });

  // Auto-select best default: largest available period
  const periods = [180, 90, 60, 30];
  let defaultDays = 0; // ALL
  for (const p of periods) {
    if (totalDays >= p) { defaultDays = p; break; }
  }
  if (totalDays < 30) defaultDays = 0;

  // Activate default button
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.remove('active');
    if (parseInt(b.dataset.days) === defaultDays) b.classList.add('active');
  });
  currentHistoryDays = defaultDays;
}

function renderHistoryChart(days) {
  const fg = DATA.cnn_fear_greed;
  if (!fg) return;
  let history = fg.history || [];
  if (history.length === 0) return;

  // Filter by days (0 = ALL)
  if (days > 0) {
    history = history.slice(-days);
  }

  // Match SPY data to F&G dates
  const spyMap = {};
  SPY_DATA.forEach(s => { spyMap[s.date] = s.close; });
  const spyValues = history.map(h => spyMap[h.date] || null);
  const hasSPY = spyValues.some(v => v !== null);

  const ctx = document.getElementById('fgHistoryChart').getContext('2d');
  if (historyChart) historyChart.destroy();

  const dates = history.map(h => h.date);
  const fgValues = history.map(h => h.y);

  const datasets = [{
    label: 'Fear & Greed',
    data: fgValues,
    borderColor: '#00d4aa',
    backgroundColor: 'rgba(0,212,170,0.08)',
    borderWidth: 2,
    fill: true,
    tension: 0.3,
    pointRadius: 0,
    pointHitRadius: 8,
    yAxisID: 'y',
  }];

  if (hasSPY) {
    datasets.push({
      label: 'SPY',
      data: spyValues,
      borderColor: '#f59e0b',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      borderDash: [],
      fill: false,
      tension: 0.3,
      pointRadius: 0,
      pointHitRadius: 8,
      yAxisID: 'y1',
    });
  }

  const scales = {
    x: {
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#71717a', font: { size: 10, family: 'JetBrains Mono' }, maxTicksLimit: 8 }
    },
    y: {
      position: 'left',
      min: 0, max: 100,
      grid: { color: 'rgba(255,255,255,0.04)' },
      ticks: { color: '#00d4aa', font: { size: 10, family: 'JetBrains Mono' } },
      title: { display: true, text: 'Fear & Greed', color: '#00d4aa', font: { size: 10 } }
    }
  };

  if (hasSPY) {
    const validSpy = spyValues.filter(v => v !== null);
    const spyMin = Math.min(...validSpy);
    const spyMax = Math.max(...validSpy);
    const padding = (spyMax - spyMin) * 0.05;
    scales.y1 = {
      position: 'right',
      min: Math.floor(spyMin - padding),
      max: Math.ceil(spyMax + padding),
      grid: { display: false },
      ticks: { color: '#f59e0b', font: { size: 10, family: 'JetBrains Mono' }, callback: v => '$' + v },
      title: { display: true, text: 'SPY', color: '#f59e0b', font: { size: 10 } }
    };
  }

  historyChart = new Chart(ctx, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: hasSPY,
          labels: { color: '#a1a1aa', font: { family: 'Noto Sans KR', size: 11 }, usePointStyle: true, pointStyle: 'line' }
        },
        tooltip: {
          backgroundColor: '#18181b',
          borderColor: '#27272a',
          borderWidth: 1,
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 12 },
          callbacks: {
            label: function(c) {
              if (c.datasetIndex === 0) {
                const v = c.parsed.y;
                return `F&G: ${v} (${v >= 75 ? '탐욕' : v >= 45 ? '중립' : '공포'})`;
              } else {
                return `SPY: $${c.parsed.y}`;
              }
            }
          }
        }
      },
      scales
    }
  });
  sendHeight();
}

// ── ApeWisdom ──
function renderApeWisdom(filter) {
  const tickers = (DATA.apewisdom || {})[filter] || [];
  const maxMentions = Math.max(...tickers.map(t => t.mentions), 1);
  const tbody = document.getElementById('tickerBody');

  tbody.innerHTML = tickers.slice(0, 15).map(t => {
    const change = t.mentions - (t.mentions_24h_ago || 0);
    const changePct = t.mentions_24h_ago ? ((change / t.mentions_24h_ago) * 100).toFixed(0) : '0';
    const trendClass = change > 0 ? 'trend-up' : change < 0 ? 'trend-down' : 'trend-flat';
    const trendIcon = change > 0 ? '▲' : change < 0 ? '▼' : '—';
    const rankChange = (t.rank_24h_ago || t.rank) - t.rank;
    const rankIcon = rankChange > 0 ? `<span class="trend-up">↑${rankChange}</span>` :
                     rankChange < 0 ? `<span class="trend-down">↓${Math.abs(rankChange)}</span>` :
                     '<span class="trend-flat">—</span>';

    return `<tr>
      <td><span class="rank-badge ${t.rank <= 3 ? 'top3' : ''}">${t.rank}</span></td>
      <td>
        <span class="ticker-symbol">${t.ticker}</span> ${rankIcon}<br>
        <span class="ticker-name">${t.name}</span>
      </td>
      <td>
        <span class="mono" style="font-size:13px">${formatNum(t.mentions)}</span>
        <div class="mentions-bar"><div class="mentions-fill" style="width:${(t.mentions / maxMentions * 100).toFixed(0)}%"></div></div>
      </td>
      <td class="${trendClass}" style="font-size:12px">
        <span class="mono">${trendIcon} ${Math.abs(changePct)}%</span>
      </td>
    </tr>`;
  }).join('');
  sendHeight();
}

      type: 'line',
      data: {
        labels: history.map(h => h.date).reverse(),
        datasets: [{
          data: history.map(h => h.value).reverse(),
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245,158,11,0.08)',
          borderWidth: 2, fill: true, tension: 0.3, pointRadius: 0, pointHitRadius: 8,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false },
          tooltip: { backgroundColor: '#18181b', borderColor: '#27272a', borderWidth: 1,
            titleFont: { family: 'JetBrains Mono', size: 11 }, bodyFont: { family: 'Noto Sans KR', size: 12 },
            callbacks: { label: c => `${c.parsed.y} (${c.parsed.y >= 55 ? '탐욕' : c.parsed.y >= 45 ? '중립' : '공포'})` }
          }
        },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#71717a', font: { size: 10, family: 'JetBrains Mono' }, maxTicksLimit: 8 } },
          y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#71717a', font: { size: 10 } } }
        }
      }
    });
  }

  // CoinGecko 트렌딩
  const trending = crypto.trending || [];
  const trendDiv = document.getElementById('trendingCoins');
  if (trending.length > 0) {
    trendDiv.innerHTML = '<table class="ticker-table"><thead><tr><th>#</th><th>코인</th><th>시총 순위</th></tr></thead><tbody>' +
      trending.map((c, i) => `<tr>
        <td><span class="rank-badge ${i < 3 ? 'top3' : ''}">${i + 1}</span></td>
        <td><span class="ticker-symbol">${c.symbol}</span><br><span class="ticker-name">${c.name}</span></td>
        <td class="mono" style="font-size:13px">${c.market_cap_rank || '-'}</td>
      </tr>`).join('') + '</tbody></table>';
  } else {
    trendDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">CoinGecko 트렌딩 데이터 없음</div>';
  }
  sendHeight();
}

// ── Finnhub ──
function renderFinnhub() {
  const items = DATA.finnhub || [];
  const container = document.getElementById('newsBars');

  if (!items || items.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text3);font-size:13px">Finnhub 뉴스 센티먼트 데이터가 없습니다.<br><span style="font-size:11px;color:var(--text3)">finnhub.io에서 무료 API 키를 발급받아<br>GitHub Secrets에 FINNHUB_API_KEY로 추가하세요.</span></div>';
    return;
  }

  container.innerHTML = items.map(item => {
    const bullColor = item.bullish_pct >= 55 ? 'var(--green)' : item.bullish_pct <= 45 ? 'var(--red)' : 'var(--yellow)';
    return `
    <div class="news-item">
      <div class="symbol-row">
        <span class="sym">${item.symbol}</span>
        <span class="buzz">기사 ${item.articles_this_week}건 · Buzz ${item.buzz_score}x</span>
      </div>
      <div class="sentiment-bar">
        <div class="bull" style="width:${item.bullish_pct}%"></div>
        <div class="bear" style="width:${item.bearish_pct}%"></div>
      </div>
      <div class="sentiment-labels">
        <span style="color:var(--green)">강세 ${item.bullish_pct}%</span>
        <span style="color:var(--red)">약세 ${item.bearish_pct}%</span>
      </div>
    </div>`;
  }).join('');
}

// Tab & Filter 핸들러
// ═══════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    sendHeight();
  });
});

document.querySelectorAll('.ticker-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ticker-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderApeWisdom(btn.dataset.filter);
  });
});

// ═══════════════════════════════════════════════
// iframe 높이 동기화 (HerdVibe 표준)
// ═══════════════════════════════════════════════
var _lastH=0,_ht;
function sendHeight(){clearTimeout(_ht);_ht=setTimeout(function(){var h=document.body.offsetHeight;if(Math.abs(h-_lastH)>5){_lastH=h;window.parent.postMessage({type:'resize',height:h},'*');}},150);}
window.addEventListener('message',function(e){if(e.data&&e.data.type==='requestResize'){_lastH=0;sendHeight();}});
window.addEventListener('resize',sendHeight);
new MutationObserver(sendHeight).observe(document.body,{childList:true,subtree:true});

// ═══════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════
loadData();
sendHeight();
</script>
